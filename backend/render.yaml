# Render Blueprint – Placement Portal Backend
# Deploy: Connect repo and Render will use this, or create service manually with same settings.

services:
  - type: web
    name: placement-api
    runtime: node
    region: oregon

    # Repo root is project root; backend is in /backend
    rootDir: backend

    buildCommand: npm install && npm run build
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: true
      # Add these in Render Dashboard → Environment (or link Secret Files):
      # MONGODB_URI, JWT_SECRET, JWT_REFRESH_SECRET, CORS_ORIGIN
